resources:
  Resources:
    # --- DDB redirects table (lean materialized view) ---
    # Single-row design: one item per code. pk = "<code>" (HASH only,
    # no range key). No GSI needed (GetItem by code is the only access
    # pattern; the alias is a separate write path that the listener
    # doesn't yet cover — alias resolution is a future concern).
    # No stream: we don't publish changes from this stack; the bus is
    # the integration channel.
    RedirectsTable:
      Type: AWS::DynamoDB::Table
      DeletionPolicy: Retain
      UpdateReplacePolicy: Retain
      Properties:
        TableName: ${self:service}-${opt:stage}-redirects
        AttributeDefinitions:
          - AttributeName: pk
            AttributeType: S
        KeySchema:
          - AttributeName: pk
            KeyType: HASH
        BillingMode: PAY_PER_REQUEST
        PointInTimeRecoverySpecification:
          PointInTimeRecoveryEnabled: true

    # --- SQS queue + DLQ for the listener ---
    # EventBridge rule below feeds the queue. The listener lambda
    # consumes from the queue and is the source of the ESM (sqs event).
    RedirectsDLQ:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${opt:stage}-dlq
        MessageRetentionPeriod: 1209600  # 14 days
        VisibilityTimeout: 120

    RedirectsListenerQueue:
      Type: AWS::SQS::Queue
      Properties:
        QueueName: ${self:service}-${opt:stage}-listener-queue
        MessageRetentionPeriod: 345600  # 4 days
        VisibilityTimeout: 90
        RedrivePolicy:
          deadLetterTargetArn:
            Fn::GetAtt: [RedirectsDLQ, Arn]
          maxReceiveCount: 5

    # --- EventBridge rule: bus -> listener queue ---
    # Source = app-bff's trigger output (url-shortener.app).
    # Detail-type filter: only the created variant. Modified/Deleted
    # events from app-bff are NOT consumed here — we don't yet support
    # updates or deletes (a future alias-update API would extend this).
    RedirectsListenerRule:
      Type: AWS::Events::Rule
      Properties:
        Name: ${self:service}-${opt:stage}-mapping-created
        EventBusName: ${self:custom.busName}
        Description: Route MappingCreated events from app-bff to redirect-bff listener queue
        State: ENABLED
        EventPattern:
          source: ["url-shortener.app"]
          detail-type: ["MappingCreated"]
        Targets:
          - Id: RedirectsListenerQueueTarget
            Arn:
              Fn::GetAtt: [RedirectsListenerQueue, Arn]

    # SQS needs an explicit resource policy to allow EventBridge to
    # send messages to it. Without this the rule is created but
    # messages never land in the queue.
    RedirectsListenerQueuePolicy:
      Type: AWS::SQS::QueuePolicy
      Properties:
        Queues:
          - Ref: RedirectsListenerQueue
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Principal:
                Service: events.amazonaws.com
              Action: sqs:SendMessage
              Resource:
                Fn::GetAtt: [RedirectsListenerQueue, Arn]
              Condition:
                ArnEquals:
                  aws:SourceArn:
                    Fn::GetAtt: [RedirectsListenerRule, Arn]

  Outputs:
    RedirectsTableName:
      Value:
        Ref: RedirectsTable
    ListenerQueueUrl:
      Value:
        Ref: RedirectsListenerQueue
    ListenerQueueArn:
      Value:
        Fn::GetAtt: [RedirectsListenerQueue, Arn]
    DLQArn:
      Value:
        Fn::GetAtt: [RedirectsDLQ, Arn]
    ApiEndpoint:
      Value:
        Fn::Sub: 'https://${HttpApi}.execute-api.${opt:region}.amazonaws.com'