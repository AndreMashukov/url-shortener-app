# IAM for the listener lambda. EventBridge -> SQS is wired by the
# queue policy (RedirectsListenerQueuePolicy), not by this role — the
# listener only needs SQS permissions to consume + delete, plus the
# DDB PutItem (covered by dynamodb.yml).

iamRoleStatements:
  Effect: Allow
  Action:
    - sqs:ReceiveMessage
    - sqs:DeleteMessage
    - sqs:GetQueueAttributes
    - sqs:GetQueueUrl
  Resource:
    - Fn::GetAtt: [RedirectsListenerQueue, Arn]
    - Fn::GetAtt: [RedirectsDLQ, Arn]