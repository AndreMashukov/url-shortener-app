# IAM for the lean redirects table. Used by both the redirect handler
# (GetItem) and the listener (PutItem). The shared role covers both.

iamRoleStatements:
  Effect: Allow
  Action:
    - dynamodb:GetItem
    - dynamodb:PutItem
    - dynamodb:UpdateItem
    - dynamodb:DeleteItem
    - dynamodb:Query
    - dynamodb:Scan
  Resource:
    - Fn::GetAtt: [RedirectsTable, Arn]